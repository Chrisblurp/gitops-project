apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
      version: green
  template:
    metadata:
      labels:
        app: gitops-app
        version: green
    spec:
      containers:
      - name: gitops-app
        image: jhon027/gitops-app-image:1.0latest
        ports:
        - containerPort: 5050